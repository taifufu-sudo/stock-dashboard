<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>股市觀察板</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --surface2: #252840;
      --border: #2e3155;
      --text: #e2e8f0;
      --text-dim: #8892a4;
      --green: #26a69a;
      --red: #ef5350;
      --accent: #5c6bc0;
      --accent2: #7986cb;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent2);
      letter-spacing: 0.5px;
    }
    .logo span { color: var(--text-dim); font-weight: 400; font-size: 13px; margin-left: 8px; }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    #clock {
      font-size: 13px;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
    }
    .refresh-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .refresh-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .refresh-btn.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Layout */
    .container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

    /* Indices bar */
    .indices-bar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .indices-bar::-webkit-scrollbar { height: 4px; }
    .indices-bar::-webkit-scrollbar-track { background: transparent; }
    .indices-bar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .index-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      min-width: 160px;
      flex-shrink: 0;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .index-card:hover { border-color: var(--accent); }
    .index-card.active { border-color: var(--accent2); background: var(--surface2); }
    .index-name { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
    .index-price { font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; margin-bottom: 4px; }
    .index-change { font-size: 12px; font-variant-numeric: tabular-nums; }
    .up { color: var(--green); }
    .down { color: var(--red); }
    .flat { color: var(--text-dim); }

    /* Main grid */
    .main-grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 16px;
      align-items: start;
    }

    /* Watchlist */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-title { font-size: 13px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; }

    /* Search */
    .search-box {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .search-box input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input::placeholder { color: var(--text-dim); }
    .search-box input:focus { border-color: var(--accent2); }
    .add-btn {
      background: var(--accent);
      border: none;
      color: white;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .add-btn:hover { background: var(--accent2); }

    /* Stock list */
    .stock-list { max-height: 520px; overflow-y: auto; }
    .stock-list::-webkit-scrollbar { width: 4px; }
    .stock-list::-webkit-scrollbar-track { background: transparent; }
    .stock-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .stock-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .stock-item:last-child { border-bottom: none; }
    .stock-item:hover { background: var(--surface2); }
    .stock-item.active { background: var(--surface2); border-left: 2px solid var(--accent2); }

    .stock-info { flex: 1; }
    .stock-symbol { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .stock-name { font-size: 11px; color: var(--text-dim); }
    .stock-prices { text-align: right; }
    .stock-price { font-size: 14px; font-weight: 500; font-variant-numeric: tabular-nums; }
    .stock-pct { font-size: 12px; font-variant-numeric: tabular-nums; }

    .remove-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 4px;
      margin-left: 8px;
      border-radius: 4px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.2s, color 0.2s;
    }
    .stock-item:hover .remove-btn { opacity: 1; }
    .remove-btn:hover { color: var(--red); }

    /* Chart panel */
    .chart-panel { display: flex; flex-direction: column; gap: 16px; }

    .chart-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .chart-symbol { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
    .chart-meta { display: flex; align-items: baseline; gap: 12px; }
    .chart-price-big { font-size: 28px; font-weight: 600; font-variant-numeric: tabular-nums; }
    .chart-change-big { font-size: 16px; font-variant-numeric: tabular-nums; }

    .chart-stats {
      display: flex;
      gap: 24px;
      padding: 0 20px 14px;
      flex-wrap: wrap;
    }
    .stat-item { }
    .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.6px; }
    .stat-value { font-size: 13px; font-variant-numeric: tabular-nums; }

    .range-btns {
      display: flex;
      gap: 4px;
      padding: 0 20px 14px;
    }
    .range-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 4px 12px;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .range-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .range-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    #chart-container {
      height: 360px;
      margin: 0 16px 16px;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    #chart-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      color: var(--text-dim);
      font-size: 13px;
      z-index: 10;
    }

    /* Mini sparklines in list */
    .sparkline {
      width: 60px;
      height: 30px;
      margin-right: 10px;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 20px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
    }
    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 5px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      padding: 10px 16px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text-dim);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }

    /* Responsive */
    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr; }
      .indices-bar { gap: 8px; }
      .index-card { min-width: 130px; padding: 10px 14px; }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="logo">股市觀察板 <span>Stock Watchboard</span></div>
  <div class="header-right">
    <div id="clock"></div>
    <button class="refresh-btn" onclick="refreshAll()">&#8635; 更新</button>
  </div>
</header>

<div class="container">
  <!-- Indices -->
  <div class="indices-bar" id="indices-bar">
    <!-- filled by JS -->
  </div>

  <!-- Main -->
  <div class="main-grid">
    <!-- Watchlist -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">自選股</span>
        <span id="watchlist-count" style="font-size:11px;color:var(--text-dim)"></span>
      </div>
      <div class="search-box">
        <input type="text" id="symbol-input" placeholder="輸入代碼，例如 AAPL 或 2330.TW" />
        <button class="add-btn" onclick="addStock()">+ 加入</button>
      </div>

      <div class="tabs">
        <div class="tab active" onclick="switchTab('all',this)">全部</div>
        <div class="tab" onclick="switchTab('tw',this)">台股</div>
        <div class="tab" onclick="switchTab('us',this)">美股</div>
      </div>

      <div class="stock-list" id="stock-list">
        <!-- filled by JS -->
      </div>
      <div class="status-bar">
        <span><span class="status-dot"></span>即時報價</span>
        <span id="last-update">--</span>
      </div>
    </div>

    <!-- Chart -->
    <div class="panel chart-panel">
      <div>
        <div class="chart-header" id="chart-header">
          <div class="chart-symbol" id="chart-symbol">選擇股票</div>
          <div class="chart-meta">
            <div class="chart-price-big" id="chart-price">--</div>
            <div class="chart-change-big" id="chart-change"></div>
          </div>
        </div>
        <div class="chart-stats" id="chart-stats"></div>
        <div class="range-btns">
          <button class="range-btn active" onclick="changeRange('1d',this)">1日</button>
          <button class="range-btn" onclick="changeRange('5d',this)">5日</button>
          <button class="range-btn" onclick="changeRange('1mo',this)">1月</button>
          <button class="range-btn" onclick="changeRange('3mo',this)">3月</button>
          <button class="range-btn" onclick="changeRange('6mo',this)">6月</button>
          <button class="range-btn" onclick="changeRange('1y',this)">1年</button>
          <button class="range-btn" onclick="changeRange('5y',this)">5年</button>
        </div>
      </div>
      <div id="chart-container">
        <div id="chart-loading">點擊左側股票查看圖表</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// Config
// ============================================================
const PROXY = 'https://corsproxy.io/?';
const DEFAULT_WATCHLIST = [
  { symbol: '0050.TW',  name: '元大台灣50' },
  { symbol: '009816.TW',name: '元大寶來台灣高股息' },
  { symbol: '2330.TW',  name: '台積電' },
  { symbol: '2317.TW',  name: '鴻海' },
  { symbol: '2454.TW',  name: '聯發科' },
  { symbol: '2308.TW',  name: '台達電' },
  { symbol: 'AAPL',     name: 'Apple' },
  { symbol: 'NVDA',     name: 'NVIDIA' },
  { symbol: 'TSLA',     name: 'Tesla' },
  { symbol: 'MSFT',     name: 'Microsoft' },
];
const INDICES = [
  { symbol: '^TWII',  name: '台灣加權' },
  { symbol: '^GSPC',  name: 'S&P 500' },
  { symbol: '^IXIC',  name: 'Nasdaq' },
  { symbol: '^DJI',   name: 'Dow Jones' },
  { symbol: '^N225',  name: 'Nikkei 225' },
  { symbol: '^HSI',   name: 'Hang Seng' },
];

// ============================================================
// State
// ============================================================
let watchlist = JSON.parse(localStorage.getItem('watchlist') || 'null') || DEFAULT_WATCHLIST;
let quoteCache = {};
let currentSymbol = null;
let currentRange = '1d';
let chartInstance = null;
let currentTab = 'all';
let autoRefreshTimer = null;

// ============================================================
// Clock
// ============================================================
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleString('zh-TW', {
    month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
    hour12: false
  });
}
setInterval(updateClock, 1000);
updateClock();

// ============================================================
// API
// ============================================================
async function fetchQuote(symbol) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=1d&range=5d`;
  try {
    const res = await fetch(PROXY + encodeURIComponent(url));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const meta = data.chart.result[0].meta;
    const price = meta.regularMarketPrice;
    const prev  = meta.chartPreviousClose || meta.previousClose;
    const change = price - prev;
    const pct = (change / prev) * 100;
    return {
      symbol,
      price,
      change,
      pct,
      open:  meta.regularMarketOpen,
      high:  meta.regularMarketDayHigh,
      low:   meta.regularMarketDayLow,
      vol:   meta.regularMarketVolume,
      mktCap: meta.marketCap,
      currency: meta.currency,
    };
  } catch (e) {
    console.warn('quote fetch failed', symbol, e);
    return null;
  }
}

async function fetchChart(symbol, range) {
  const intervalMap = { '1d':'5m','5d':'15m','1mo':'1d','3mo':'1d','6mo':'1d','1y':'1wk','5y':'1mo' };
  const interval = intervalMap[range] || '1d';
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=${interval}&range=${range}`;
  try {
    const res = await fetch(PROXY + encodeURIComponent(url));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const result = data.chart.result[0];
    const timestamps = result.timestamp;
    const quotes = result.indicators.quote[0];
    const ohlc = [];
    for (let i = 0; i < timestamps.length; i++) {
      if (!quotes.close[i]) continue;
      ohlc.push({
        time: timestamps[i],
        open:  quotes.open[i]  || quotes.close[i],
        high:  quotes.high[i]  || quotes.close[i],
        low:   quotes.low[i]   || quotes.close[i],
        close: quotes.close[i],
        value: quotes.close[i],
        volume: quotes.volume[i] || 0,
      });
    }
    return ohlc;
  } catch(e) {
    console.warn('chart fetch failed', symbol, e);
    return null;
  }
}

// ============================================================
// Render helpers
// ============================================================
function fmtNum(n, dec=2) {
  if (n == null) return '--';
  return n.toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}
function fmtVol(n) {
  if (!n) return '--';
  if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return n.toString();
}
function colorClass(v) { return v > 0 ? 'up' : v < 0 ? 'down' : 'flat'; }
function arrow(v) { return v > 0 ? '▲' : v < 0 ? '▼' : ''; }

function showToast(msg, duration=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ============================================================
// Indices bar
// ============================================================
function renderIndicesBar() {
  const bar = document.getElementById('indices-bar');
  bar.innerHTML = INDICES.map(idx => `
    <div class="index-card" id="idx-${idx.symbol.replace(/\^/,'')}" onclick="loadChart('${idx.symbol}','${idx.name}')">
      <div class="index-name">${idx.name}</div>
      <div class="index-price skeleton" style="height:22px;width:90px;">&nbsp;</div>
      <div class="index-change skeleton" style="height:14px;width:70px;margin-top:4px;">&nbsp;</div>
    </div>
  `).join('');
}

async function refreshIndices() {
  await Promise.all(INDICES.map(async idx => {
    const q = await fetchQuote(idx.symbol);
    if (!q) return;
    const id = 'idx-' + idx.symbol.replace(/\^/,'');
    const card = document.getElementById(id);
    if (!card) return;
    const cc = colorClass(q.change);
    card.querySelector('.index-price').outerHTML = `<div class="index-price ${cc}">${fmtNum(q.price)}</div>`;
    card.querySelectorAll('.index-change,.skeleton')[0]?.remove();
    const existing = card.querySelector('.index-change');
    if (existing) {
      existing.className = 'index-change ' + cc;
      existing.textContent = `${arrow(q.change)} ${fmtNum(Math.abs(q.change))} (${fmtNum(Math.abs(q.pct))}%)`;
    } else {
      card.insertAdjacentHTML('beforeend', `<div class="index-change ${cc}">${arrow(q.change)} ${fmtNum(Math.abs(q.change))} (${fmtNum(Math.abs(q.pct))}%)</div>`);
    }
  }));
}

// ============================================================
// Watchlist
// ============================================================
function saveWatchlist() {
  localStorage.setItem('watchlist', JSON.stringify(watchlist));
}

function getFilteredList() {
  if (currentTab === 'tw') return watchlist.filter(s => s.symbol.endsWith('.TW') || s.symbol.endsWith('.TWO'));
  if (currentTab === 'us') return watchlist.filter(s => !s.symbol.includes('.'));
  return watchlist;
}

function renderStockList() {
  const list = document.getElementById('stock-list');
  const filtered = getFilteredList();
  document.getElementById('watchlist-count').textContent = `${filtered.length} 支`;

  if (filtered.length === 0) {
    list.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text-dim);font-size:13px;">尚無自選股</div>`;
    return;
  }

  list.innerHTML = filtered.map(s => {
    const q = quoteCache[s.symbol];
    const priceHtml = q
      ? `<div class="stock-price ${colorClass(q.change)}">${fmtNum(q.price)}</div>
         <div class="stock-pct ${colorClass(q.pct)}">${arrow(q.pct)} ${fmtNum(Math.abs(q.pct))}%</div>`
      : `<div class="stock-price skeleton" style="height:16px;width:60px;">&nbsp;</div>
         <div class="stock-pct skeleton" style="height:12px;width:50px;margin-top:3px;">&nbsp;</div>`;
    const active = s.symbol === currentSymbol ? 'active' : '';
    return `
      <div class="stock-item ${active}" onclick="loadChart('${s.symbol}','${s.name}')">
        <div class="stock-info">
          <div class="stock-symbol">${s.symbol}</div>
          <div class="stock-name">${s.name}</div>
        </div>
        <div class="stock-prices">${priceHtml}</div>
        <button class="remove-btn" onclick="removeStock(event,'${s.symbol}')" title="移除">✕</button>
      </div>`;
  }).join('');
}

async function refreshWatchlistQuotes() {
  await Promise.all(watchlist.map(async s => {
    const q = await fetchQuote(s.symbol);
    if (q) quoteCache[s.symbol] = q;
  }));
  renderStockList();
  document.getElementById('last-update').textContent = new Date().toLocaleTimeString('zh-TW', { hour12: false });
}

async function addStock() {
  const input = document.getElementById('symbol-input');
  let sym = input.value.trim().toUpperCase();
  if (!sym) return;
  // Auto-append .TW for 4–6 digit Taiwan stock/ETF codes
  if (/^\d{4,6}$/.test(sym)) sym = sym + '.TW';

  if (watchlist.find(s => s.symbol === sym)) {
    showToast(`${sym} 已在自選股中`);
    input.value = '';
    return;
  }

  showToast(`查詢 ${sym}...`);
  const q = await fetchQuote(sym);
  if (!q) {
    showToast(`找不到 ${sym}，請確認代碼`);
    return;
  }
  // Try to get proper name
  let name = sym;
  watchlist.push({ symbol: sym, name });
  saveWatchlist();
  quoteCache[sym] = q;
  renderStockList();
  input.value = '';
  showToast(`已加入 ${sym}`);
  loadChart(sym, name);
}

function removeStock(e, symbol) {
  e.stopPropagation();
  watchlist = watchlist.filter(s => s.symbol !== symbol);
  saveWatchlist();
  delete quoteCache[symbol];
  if (currentSymbol === symbol) {
    currentSymbol = null;
    document.getElementById('chart-symbol').textContent = '選擇股票';
    document.getElementById('chart-price').textContent = '--';
    document.getElementById('chart-change').textContent = '';
    document.getElementById('chart-stats').innerHTML = '';
    document.getElementById('chart-loading').style.display = 'flex';
    document.getElementById('chart-loading').textContent = '點擊左側股票查看圖表';
  }
  renderStockList();
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderStockList();
}

// ============================================================
// Chart
// ============================================================
async function loadChart(symbol, name) {
  currentSymbol = symbol;
  renderStockList();

  const loading = document.getElementById('chart-loading');
  loading.style.display = 'flex';
  loading.textContent = '載入中...';

  // Update header skeleton
  document.getElementById('chart-symbol').textContent = `${symbol}  ${name}`;

  // Show quote info
  let q = quoteCache[symbol];
  if (!q) {
    q = await fetchQuote(symbol);
    if (q) quoteCache[symbol] = q;
  }
  if (q) {
    const cc = colorClass(q.change);
    document.getElementById('chart-price').className = `chart-price-big ${cc}`;
    document.getElementById('chart-price').textContent = fmtNum(q.price);
    document.getElementById('chart-change').className = `chart-change-big ${cc}`;
    document.getElementById('chart-change').textContent = `${arrow(q.change)} ${fmtNum(q.change)} (${fmtNum(q.pct)}%)`;
    document.getElementById('chart-stats').innerHTML = `
      <div class="stat-item"><div class="stat-label">開盤</div><div class="stat-value">${fmtNum(q.open)}</div></div>
      <div class="stat-item"><div class="stat-label">最高</div><div class="stat-value up">${fmtNum(q.high)}</div></div>
      <div class="stat-item"><div class="stat-label">最低</div><div class="stat-value down">${fmtNum(q.low)}</div></div>
      <div class="stat-item"><div class="stat-label">成交量</div><div class="stat-value">${fmtVol(q.vol)}</div></div>
      ${q.mktCap ? `<div class="stat-item"><div class="stat-label">市值</div><div class="stat-value">${fmtVol(q.mktCap)}</div></div>` : ''}
      <div class="stat-item"><div class="stat-label">幣別</div><div class="stat-value">${q.currency||'USD'}</div></div>
    `;
  }

  // Fetch chart data
  const ohlc = await fetchChart(symbol, currentRange);

  loading.style.display = 'none';

  if (!ohlc || ohlc.length === 0) {
    loading.style.display = 'flex';
    loading.textContent = '無法載入圖表資料';
    return;
  }

  drawChart(ohlc, q);
}

function drawChart(ohlc, quote) {
  const container = document.getElementById('chart-container');

  // Destroy old
  if (chartInstance) { chartInstance.remove(); chartInstance = null; }

  const chart = LightweightCharts.createChart(container, {
    width:  container.clientWidth,
    height: container.clientHeight,
    layout: {
      background: { color: '#1a1d2e' },
      textColor: '#8892a4',
    },
    grid: {
      vertLines: { color: '#2e3155' },
      horzLines: { color: '#2e3155' },
    },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#2e3155' },
    timeScale: {
      borderColor: '#2e3155',
      timeVisible: true,
      secondsVisible: false,
    },
  });

  const upColor   = '#26a69a';
  const downColor = '#ef5350';

  // Use candlestick for ranges > 1d, area for intraday
  if (currentRange === '1d') {
    const areaSeries = chart.addAreaSeries({
      lineColor: quote && quote.change >= 0 ? upColor : downColor,
      topColor:  quote && quote.change >= 0 ? 'rgba(38,166,154,0.3)' : 'rgba(239,83,80,0.3)',
      bottomColor: 'rgba(0,0,0,0)',
      lineWidth: 2,
    });
    areaSeries.setData(ohlc.map(d => ({ time: d.time, value: d.value })));
  } else {
    const candleSeries = chart.addCandlestickSeries({
      upColor, downColor,
      borderUpColor: upColor, borderDownColor: downColor,
      wickUpColor: upColor, wickDownColor: downColor,
    });
    candleSeries.setData(ohlc);
  }

  chart.timeScale().fitContent();

  // Resize observer
  const ro = new ResizeObserver(() => {
    chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
  });
  ro.observe(container);

  chartInstance = chart;
  chart._ro = ro;
}

function changeRange(range, btn) {
  currentRange = range;
  document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (currentSymbol) {
    const s = watchlist.find(w => w.symbol === currentSymbol);
    loadChart(currentSymbol, s ? s.name : currentSymbol);
  }
}

// ============================================================
// Refresh all
// ============================================================
async function refreshAll() {
  const btn = document.querySelector('.refresh-btn');
  btn.classList.add('spinning');
  await Promise.all([
    refreshIndices(),
    refreshWatchlistQuotes(),
  ]);
  btn.classList.remove('spinning');
  if (currentSymbol) {
    const s = watchlist.find(w => w.symbol === currentSymbol);
    loadChart(currentSymbol, s ? s.name : currentSymbol);
  }
}

// ============================================================
// Enter key for adding stock
// ============================================================
document.getElementById('symbol-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addStock();
});

// ============================================================
// Auto refresh every 60s
// ============================================================
function startAutoRefresh() {
  clearInterval(autoRefreshTimer);
  autoRefreshTimer = setInterval(() => {
    refreshIndices();
    refreshWatchlistQuotes();
  }, 60000);
}

// ============================================================
// Init
// ============================================================
(async () => {
  renderIndicesBar();
  renderStockList();
  await Promise.all([refreshIndices(), refreshWatchlistQuotes()]);
  // Load first stock chart
  if (watchlist.length > 0) {
    loadChart(watchlist[0].symbol, watchlist[0].name);
  }
  startAutoRefresh();
})();
</script>
