<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>股市觀察板</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

<header>
  <div class="logo">股市觀察板 <span>Stock Watchboard</span></div>
  <div class="header-right">
    <div id="clock"></div>
    <button class="refresh-btn" onclick="app.refreshAll()">&#8635; 更新</button>
  </div>
</header>

<div class="container">
  <div class="indices-bar" id="indices-bar"></div>

  <div class="main-grid">
    <!-- Watchlist -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">自選股</span>
        <span id="watchlist-count" style="font-size:11px;color:var(--text-dim)"></span>
      </div>
      <div class="search-box">
        <input type="text" id="symbol-input" placeholder="輸入代碼，例如 AAPL 或 2330.TW" />
        <button class="add-btn" onclick="app.addStock()">+ 加入</button>
      </div>
      <div class="tabs">
        <div class="tab active" onclick="app.switchTab('all',this)">全部</div>
        <div class="tab" onclick="app.switchTab('tw',this)">台股</div>
        <div class="tab" onclick="app.switchTab('us',this)">美股</div>
      </div>
      <div class="stock-list" id="stock-list"></div>
      <div class="status-bar">
        <span><span class="status-dot"></span>即時報價</span>
        <span id="last-update">--</span>
      </div>
    </div>

    <!-- Chart -->
    <div class="panel chart-panel">
      <div>
        <div class="chart-header">
          <div class="chart-symbol" id="chart-symbol">選擇股票</div>
          <div class="chart-meta">
            <div class="chart-price-big" id="chart-price">--</div>
            <div class="chart-change-big" id="chart-change"></div>
          </div>
        </div>
        <div class="chart-stats" id="chart-stats"></div>
        <div class="range-btns">
          <button class="range-btn active" onclick="app.changeRange('1d',this)">1日</button>
          <button class="range-btn" onclick="app.changeRange('5d',this)">5日</button>
          <button class="range-btn" onclick="app.changeRange('1mo',this)">1月</button>
          <button class="range-btn" onclick="app.changeRange('3mo',this)">3月</button>
          <button class="range-btn" onclick="app.changeRange('6mo',this)">6月</button>
          <button class="range-btn" onclick="app.changeRange('1y',this)">1年</button>
          <button class="range-btn" onclick="app.changeRange('5y',this)">5年</button>
        </div>
      </div>
      <div id="chart-container">
        <div id="chart-loading">點擊左側股票查看圖表</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
